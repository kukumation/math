<!DOCTYPE html><html lang="zh-CN"><head><meta name="x-poe-datastore-behavior" content="local_only"><meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' data: blob: https://cdnjs.cloudflare.com https://cdn.jsdelivr.net https://code.jquery.com https://unpkg.com https://d3js.org https://threejs.org https://cdn.plot.ly https://stackpath.bootstrapcdn.com https://maps.googleapis.com https://cdn.tailwindcss.com https://ajax.googleapis.com https://kit.fontawesome.com https://cdn.datatables.net https://maxcdn.bootstrapcdn.com https://code.highcharts.com https://tako-static-assets-production.s3.amazonaws.com https://www.youtube.com https://fonts.googleapis.com https://fonts.gstatic.com https://pfst.cf2.poecdn.net https://puc.poecdn.net https://i.imgur.com https://wikimedia.org https://*.icons8.com https://*.giphy.com https://picsum.photos https://images.unsplash.com; frame-src 'self' https://www.youtube.com https://trytako.com; child-src 'self'; manifest-src 'self'; worker-src 'self'; upgrade-insecure-requests; block-all-mixed-content;">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Mario Math Quest 🍄</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&amp;display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#FBD000;--red:#E52521;--green:#43B047;--px:'Press Start 2P',monospace;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:var(--px);}
#app{width:100%;height:100%;max-width:480px;margin:0 auto;position:relative;overflow:hidden;}
.scr{display:none;position:absolute;inset:0;flex-direction:column;overflow-y:auto;overflow-x:hidden;}
.scr.on{display:flex;}
.pb{cursor:pointer;border:3px solid #000;box-shadow:4px 4px 0 #000;transition:transform .07s,box-shadow .07s;user-select:none;outline:none;-webkit-tap-highlight-color:transparent;display:inline-flex;align-items:center;justify-content:center;}
.pb:active{transform:translate(3px,3px);box-shadow:1px 1px 0 #000}
.wb0{background:linear-gradient(180deg,#56A8E5 0%,#7EC8A4 45%,#4DB36A 70%,#2E7D32 100%);}
.wb1{background:linear-gradient(180deg,#0077B6 0%,#00B4D8 40%,#48CAE4 65%,#1A5276 100%);}
.wb2{background:linear-gradient(180deg,#1a0000 0%,#7B0E00 35%,#CC3300 60%,#FF6600 85%,#1a0a00 100%);}
.wb3{background:linear-gradient(180deg,#E0F4FF 0%,#B3D9FF 40%,#8EC6FF 70%,#1A3A5C 100%);}
.wb4{background:linear-gradient(180deg,#F0F9FF 0%,#87CEEB 30%,#E0F4FF 60%,#B3D9FF 85%,#2A6A9A 100%);}
.wb5{background:linear-gradient(180deg,#050010 0%,#1a0050 30%,#3d0080 60%,#0d0020 100%);}
.wb-dark{background:linear-gradient(180deg,#0F0527,#1a0050,#0F0527);}
.wb-boss{background:linear-gradient(180deg,#0d0000,#3d0000,#7a0000,#0d0000);}
.hud{background:rgba(0,0,0,.88);border-bottom:3px solid #333;padding:10px 14px 8px;display:flex;align-items:center;gap:8px;flex-shrink:0;position:sticky;top:0;z-index:100;backdrop-filter:blur(4px);}
.coin-orb{width:22px;height:22px;border-radius:50%;flex-shrink:0;background:radial-gradient(circle at 35% 35%,#FFE57A,#FBD000 60%,#E65100);border:2px solid #E65100;box-shadow:2px 2px 0 #000;}
.q-card{background:linear-gradient(145deg,#FFD54F,#FBD000,#F9A825);border:4px solid #E65100;box-shadow:6px 6px 0 #000,inset 3px 3px 0 rgba(255,255,255,.4);border-radius:8px;padding:20px 16px;}
.choice-btn{border-radius:6px;border:3px solid #000;box-shadow:5px 5px 0 #000;font-family:var(--px);font-size:18px;color:#fff;text-shadow:2px 2px 0 rgba(0,0,0,.5);padding:16px 8px;cursor:pointer;transition:transform .07s,box-shadow .07s;-webkit-tap-highlight-color:transparent;outline:none;}
.choice-btn:active{transform:translate(3px,3px);box-shadow:2px 2px 0 #000;}
.choice-btn:disabled{cursor:default;}
.choice-btn.ok{background:#43B047!important;border-color:#2E7D32!important;}
.choice-btn.ng{background:#E52521!important;border-color:#B71C1C!important;}
.prog-track{height:12px;background:#222;border:2px solid #444;border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,#FBD000,#FFD54F);transition:width .4s ease;}
.lv-card{border-radius:10px;padding:14px 8px 12px;border:3px solid rgba(0,0,0,.4);box-shadow:4px 4px 0 rgba(0,0,0,.7);cursor:pointer;display:flex;flex-direction:column;align-items:center;text-align:center;gap:4px;min-height:118px;justify-content:center;transition:transform .08s,box-shadow .08s;user-select:none;-webkit-tap-highlight-color:transparent;position:relative;}
.lv-card:active:not(.lv-locked){transform:translate(3px,3px);box-shadow:1px 1px 0 rgba(0,0,0,.7);}
.lv-card.lv-locked{cursor:default;opacity:.5;}
.lv-card.lv-current{animation:pulse-lv 1.1s ease-in-out infinite;}
@keyframes pulse-lv{0%,100%{box-shadow:4px 4px 0 rgba(0,0,0,.7)}50%{box-shadow:4px 4px 0 rgba(0,0,0,.7),0 0 0 5px rgba(255,255,255,.25)}}
.cc{display:flex;flex-direction:column;align-items:center;justify-content:center;border:2px solid rgba(255,255,255,.12);transition:all .25s;position:relative;overflow:hidden;font-size:10px;height:44px;}
.cc.built{border-color:rgba(255,255,255,.25);}
.cc.avail{border:2px dashed #00ff88;background:rgba(0,255,100,.12)!important;cursor:pointer;animation:pulse-cell 1.5s ease-in-out infinite;}
.cc.avail:active{transform:scale(.92);}
.cc.locked{background:rgba(0,0,0,.5)!important;border-color:#222;}
.cc.need-coins{border:2px dashed #FBD000;background:rgba(251,208,0,.08)!important;}
@keyframes pulse-cell{0%,100%{box-shadow:0 0 0 0 rgba(0,255,100,.4)}50%{box-shadow:0 0 0 4px rgba(0,255,100,0)}}
@keyframes build-in{0%{transform:scale(0) rotate(-10deg);opacity:0}70%{transform:scale(1.15) rotate(2deg)}100%{transform:scale(1) rotate(0);opacity:1}}
.cc.just-built{animation:build-in .4s ease forwards!important;}
@keyframes boss-shake{
  0%,100%{transform:translateY(0) scale(1);}
  20%{transform:translateX(-16px) scale(1.12);}
  40%{transform:translateX(16px) scale(1.12);}
  60%{transform:translateX(-8px) scale(1.06);}
  80%{transform:translateX(8px) scale(1.06);}
}
.boss-hit{animation:boss-shake .38s ease!important;filter:brightness(4) hue-rotate(-20deg) saturate(6)!important;}
.topic-toggle{width:46px;height:26px;border-radius:13px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0;}
.topic-toggle-knob{width:22px;height:22px;background:#fff;border-radius:50%;position:absolute;top:2px;transition:left .2s;box-shadow:0 1px 4px rgba(0,0,0,.3);}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(16px);background:#0d0d0d;color:var(--gold);font-size:8px;padding:10px 18px;border-radius:6px;border:3px solid var(--gold);box-shadow:4px 4px 0 rgba(0,0,0,.5);opacity:0;transition:opacity .2s,transform .2s;z-index:500;text-align:center;max-width:280px;white-space:pre-line;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
@keyframes cpop{0%{opacity:1;transform:translateY(0) scale(.5)}60%{opacity:1;transform:translateY(-36px) scale(1.2)}100%{opacity:0;transform:translateY(-64px) scale(.8)}}
.cpop{position:fixed;pointer-events:none;z-index:600;font-family:var(--px);font-size:12px;color:var(--gold);text-shadow:2px 2px 0 #000;animation:cpop .9s ease-out forwards;}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{0%{transform:scale(0)}70%{transform:scale(1.15)}100%{transform:scale(1)}}
@keyframes twinkle{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.1)}}
@keyframes float-cloud{from{transform:translateX(-80px)}to{transform:translateX(calc(100vw + 80px))}}
@keyframes conffall{0%{transform:translate(0,0) rotate(0);opacity:1}100%{transform:translate(var(--dx),var(--dy)) rotate(var(--rot));opacity:0}}
.confetti{position:fixed;pointer-events:none;z-index:700;font-size:18px;animation:conffall 1.6s ease-out forwards;}
.bounce{animation:bounce 1s ease-in-out infinite;}
.blink{animation:blink 1s step-start infinite;}
.spin{animation:spin 2s linear infinite;}
.fade-up{animation:fadeUp .35s ease forwards;}
.pop{animation:pop .3s ease forwards;}
.cloud{position:absolute;font-size:2rem;animation:float-cloud var(--speed) linear var(--del) infinite;opacity:.35;}
.star-layer{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.star{position:absolute;font-size:8px;animation:twinkle var(--dur) ease-in-out var(--del) infinite;}
.lava-bubble{position:absolute;border-radius:50%;background:radial-gradient(circle at 40% 40%,#FF6600,#CC2200);animation:bounce var(--dur) ease-in-out var(--del) infinite;opacity:.6;}
.world-card{border-radius:10px;overflow:hidden;cursor:pointer;transition:transform .12s;box-shadow:0 4px 20px rgba(0,0,0,.4);}
.world-card:active{transform:scale(.97);}
.sheet{background:linear-gradient(180deg,#1a1a2e,#16213e);border-radius:20px 20px 0 0;border-top:4px solid #4f46e5;position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;z-index:400;box-shadow:0 -8px 32px rgba(0,0,0,.8);transition:transform .3s ease;max-height:72vh;display:flex;flex-direction:column;}
.sheet.off{transform:translateX(-50%) translateY(100%);}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:399;display:none;}
.overlay.on{display:block;}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px}
.num-display{font-size:22px;color:#1e1b4b;font-family:var(--px);background:#fff;border-radius:8px;padding:8px 14px;border:3px solid #e0e7ff;box-shadow:inset 2px 2px 0 rgba(0,0,0,.07);display:inline-block;min-width:44px;text-align:center;}
.op-sign{font-size:20px;color:#7c3aed;font-family:var(--px);}
.eq-row{display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;}
.blank-box{font-size:22px;color:#a855f7;font-family:var(--px);background:#f3e8ff;border-radius:8px;padding:8px 14px;border:3px dashed #a855f7;display:inline-block;min-width:56px;text-align:center;}
</style>
</head>
<body>
<div id="app">

<!-- HOME -->
<div id="s-home" class="scr wb-dark" style="padding-bottom:32px;">
  <div class="star-layer" id="home-stars"></div>
  <div id="home-clouds" style="position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:1;"></div>
  <div style="position:relative;z-index:10;padding:36px 16px 0;">
    <div style="text-align:center;margin-bottom:24px;">
      <div style="font-size:13px;color:var(--gold);text-shadow:3px 3px 0 #E65100,5px 5px 0 #000;line-height:2.2;letter-spacing:2px;">MARIO<br>MATH QUEST</div>
      <div class="blink" style="font-size:8px;color:#fff;text-shadow:2px 2px 0 #000;margin-top:4px;">— CHOOSE A WORLD —</div>
    </div>
    <div id="home-stats" style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px;"></div>
    <div id="btn-kingdom" class="pb" style="background:linear-gradient(135deg,#4338ca,#7c3aed);border-radius:10px;padding:14px;display:flex;align-items:center;gap:12px;margin-bottom:16px;">
      <div style="font-size:2rem;">🏰</div>
      <div style="flex:1;"><div style="font-size:8px;color:#fff;">MY KINGDOM</div><div id="k-sub" style="font-size:6px;color:#c4b5fd;margin-top:3px;"></div></div>
      <div id="k-notify" style="display:none;width:12px;height:12px;background:#00ff88;border-radius:50%;box-shadow:0 0 8px #00ff88;animation:pulse-cell 1s ease infinite;"></div>
      <div style="font-size:16px;color:rgba(255,255,255,.5);">›</div>
    </div>
    <div id="world-list" style="display:flex;flex-direction:column;gap:10px;"></div>
    <div id="btn-parent" class="pb" style="background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.15);border-radius:8px;padding:12px;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:14px;">
      <span>📊</span><span style="font-size:7px;color:#fff;">PARENT DASHBOARD</span><span style="opacity:.4;">🔒</span>
    </div>
    <div id="home-aud" style="position:fixed;top:14px;right:14px;z-index:200;"></div>
  </div>
</div>

<!-- REGION / LEVEL SELECT -->
<div id="s-region" class="scr">
  <div id="region-ambience" style="position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0;"></div>
  <div id="map-hdr" style="position:sticky;top:0;z-index:30;background:rgba(0,0,0,.78);backdrop-filter:blur(8px);border-bottom:3px solid rgba(255,255,255,.1);flex-shrink:0;padding:40px 14px 14px;">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;">
      <div id="btn-map-back" class="pb" style="width:40px;height:40px;background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.25);border-radius:50%;font-size:20px;color:#fff;flex-shrink:0;">‹</div>
      <div style="flex:1;min-width:0;">
        <div id="map-wname" style="font-size:9px;color:#fff;text-shadow:2px 2px 0 rgba(0,0,0,.8);"></div>
        <div id="map-wsub" style="font-family:system-ui;font-size:11px;color:rgba(255,255,255,.55);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;"></div>
      </div>
      <div id="map-badge-icon" style="font-size:2rem;flex-shrink:0;"></div>
      <div id="map-aud" style="flex-shrink:0;"></div>
    </div>
    <div id="map-stat-row" style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;"></div>
  </div>
  <div id="map-scroll" style="flex:1;overflow-y:auto;overflow-x:hidden;position:relative;z-index:10;">
    <div id="map-canvas" style="padding:14px 14px 28px;"></div>
  </div>
</div>

<!-- GAME -->
<div id="s-game" class="scr">
  <div class="hud">
    <div id="g-world" style="font-size:6px;color:#aaa;line-height:1.7;min-width:40px;"></div>
    <div style="display:flex;align-items:center;gap:5px;"><div class="coin-orb bounce"></div><div id="g-coins" style="font-size:8px;color:var(--gold);"></div></div>
    <div id="g-lives" style="display:flex;gap:3px;"></div>
    <div style="flex:1;"></div>
    <div id="g-aud"></div>
  </div>
  <div id="g-band" style="padding:7px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0;">
    <div id="g-lname" style="font-size:6px;color:#fff;flex:1;"></div>
    <div class="prog-track" style="width:72px;"><div id="g-prog" class="prog-fill" style="width:0%;"></div></div>
    <div id="g-qnum" style="font-size:6px;color:#fff;"></div>
  </div>
  <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 14px;gap:12px;overflow:hidden;">
    <div id="q-card" class="q-card" style="width:100%;max-width:360px;min-height:130px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;">
      <div id="q-icon" style="font-size:2.6rem;margin-bottom:6px;"></div>
      <div id="q-body"></div>
    </div>
    <div id="choices" style="display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:360px;"></div>
  </div>
  <div id="g-toast" class="toast"></div>
  <div id="g-cpops"></div>
</div>

<!-- BOSS -->
<div id="s-boss" class="scr wb-boss">
  <div style="padding:36px 14px 10px;flex-shrink:0;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
      <div id="btn-boss-back" class="pb" style="width:40px;height:40px;background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.2);border-radius:50%;font-size:20px;color:#fff;">‹</div>
      <div style="text-align:center;"><div style="font-size:7px;color:#f87171;letter-spacing:3px;">⚔️ BOSS BATTLE</div><div id="boss-name" style="font-size:9px;color:var(--gold);margin-top:3px;"></div></div>
      <div style="display:flex;align-items:center;gap:6px;"><div id="boss-php"></div><div id="boss-aud"></div></div>
    </div>
    <div style="margin-bottom:8px;">
      <div style="display:flex;justify-content:space-between;font-size:6px;color:#f87171;margin-bottom:4px;"><span>BOSS HP</span><span id="boss-hp-txt"></span></div>
      <div style="height:18px;background:#1a0505;border:3px solid #7f1d1d;border-radius:3px;overflow:hidden;"><div id="boss-hp-bar" style="height:100%;background:linear-gradient(90deg,#dc2626,#f97316);width:100%;transition:width .4s;"></div></div>
    </div>
    <div style="position:relative;text-align:center;margin-bottom:4px;">
      <div id="boss-spr" class="bounce" style="font-size:5rem;display:inline-block;"></div>
      <div id="boss-bubble" style="display:none;position:absolute;left:50%;transform:translateX(-50%);bottom:calc(100% + 6px);background:#1a1a1a;border:2px solid #7f1d1d;border-radius:8px;padding:8px 14px;font-size:7px;color:#fff;white-space:nowrap;z-index:20;"></div>
    </div>
  </div>
  <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 14px 14px;gap:10px;overflow:hidden;">
    <div id="bq-card" style="width:100%;max-width:360px;padding:18px;min-height:120px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;background:#1c0808;border:4px solid #7f1d1d;box-shadow:6px 6px 0 #000;border-radius:8px;">
      <div id="bq-icon" style="font-size:2.6rem;margin-bottom:6px;"></div>
      <div id="bq-body" style="color:#fff;"></div>
    </div>
    <div id="b-choices" style="display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:360px;"></div>
    <div id="b-toast" class="toast"></div>
  </div>
</div>

<!-- VICTORY -->
<div id="s-victory" class="scr wb0" style="align-items:center;justify-content:center;padding:32px 20px;text-align:center;">
  <div id="vic-icon" style="font-size:5rem;margin-bottom:12px;"></div>
  <div style="font-size:11px;color:#fff;text-shadow:3px 3px 0 #000;margin-bottom:4px;">LEVEL CLEAR!</div>
  <div id="vic-lname" style="font-size:7px;color:var(--gold);text-shadow:2px 2px 0 #000;margin-bottom:14px;"></div>
  <div id="vic-stars" style="display:flex;gap:8px;justify-content:center;margin-bottom:12px;"></div>
  <div id="vic-coins" class="pb" style="background:rgba(0,0,0,.5);border-radius:8px;padding:9px 22px;font-size:9px;color:var(--gold);margin-bottom:8px;"></div>
  <div id="vic-unlock" style="font-size:6px;color:#00ff88;margin-bottom:18px;min-height:16px;"></div>
  <div id="vic-btns" style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;"></div>
</div>

<!-- BOSS VICTORY -->
<div id="s-bvic" class="scr" style="background:linear-gradient(135deg,#0d0030,#3d0080,#700090);align-items:center;justify-content:center;padding:32px 20px;text-align:center;">
  <div id="bv-icon" class="spin" style="font-size:6rem;margin-bottom:12px;"></div>
  <div style="font-size:11px;color:var(--gold);text-shadow:4px 4px 0 #000;margin-bottom:8px;">BOSS CLEARED!</div>
  <div id="bv-sub" style="font-size:7px;color:#fff;margin-bottom:18px;"></div>
  <div id="bv-badge" class="pb" style="background:rgba(0,0,0,.5);border-radius:12px;padding:14px 18px;display:flex;align-items:center;gap:14px;margin-bottom:10px;width:100%;max-width:320px;text-align:left;"></div>
  <div id="bv-castle-unlock" style="font-size:6px;color:#00ff88;margin-bottom:20px;min-height:16px;"></div>
  <div id="bv-btns" style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;"></div>
</div>

<!-- BOSS LOSE -->
<div id="s-blose" class="scr wb-boss" style="align-items:center;justify-content:center;padding:32px 20px;text-align:center;">
  <div style="font-size:5rem;margin-bottom:12px;">💀</div>
  <div style="font-size:11px;color:#f87171;text-shadow:3px 3px 0 #000;margin-bottom:8px;">GAME OVER</div>
  <div style="font-size:7px;color:#888;margin-bottom:30px;">Train harder and return!</div>
  <div style="display:flex;gap:12px;">
    <div id="btn-bl-map" class="pb" style="background:#374151;border-radius:6px;padding:14px 18px;font-size:8px;color:#fff;">🗺️ MAP</div>
    <div id="btn-bl-retry" class="pb" style="background:#dc2626;border-radius:6px;padding:14px 18px;font-size:8px;color:#fff;">⚔️ RETRY</div>
  </div>
</div>

<!-- KINGDOM BUILDER -->
<div id="s-builder" class="scr" style="background:linear-gradient(180deg,#0d1a0d,#1a2f1a,#0d1a0d);">

function playBossTheme(){
  const BPM=255, ms=60000/BPM;
  const mel=[330,0,330,0,392,0,330,0,440,0,440,330,294,0,330,0,349,370,392,440,466,440,392,0,330,0,294,262,294,330,0,0];

  let i=0;
  function tick(){
    const ctx=AC();if(!ctx)return;
    const mf=mel[i%mel.length], bf=bas[i%bas.length], t=ctx.currentTime;
    if(mf>0){const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type='square';o.frequency.value=mf;g.gain.setValueAtTime(0.045,t);g.gain.exponentialRampToValueAtTime(0.001,t+ms/1000*.78);o.start(t);o.stop(t+ms/1000+.01);}
    if(bf>0){const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type='sawtooth';o.frequency.value=bf;g.gain.setValueAtTime(0.038,t);g.gain.exponentialRampToValueAtTime(0.001,t+ms/1000*.88);o.start(t);o.stop(t+ms/1000+.01);}
    i++;bgTimer=setTimeout(tick,ms);
  }
  tick();
}

function playBg(key){

  }
  tick();
}

function numRow(parts){

function mkC(ans,ws){
  const pool=[String(ans)];
  ws.forEach(w=>{const s=String(Math.max(0,Math.round(w)));if(s!==String(ans)&&!pool.includes(s)&&+s>=0)pool.push(s);});
  let n=+ans+1;while(pool.length<4){const s=String(n);if(!pool.includes(s))pool.push(s);n++;}
  return shuffle(pool.slice(0,4));
}

    return{type:'algebra',key:`alg:${star}:${box}:${askStar?1:0}`,i:'🔣',
      tts:`Star plus square equals ${sum}. Star minus square equals ${diff}. What is the value of the ${askStar?'star':'square'}?`,
      render:true,
      display:`<div style="display:flex;flex-direction:column;align-items:center;gap:8px">${numRow([{t:'num',v:'★'},{t:'op',v:'+'},{t:'num',v:'□'},{t:'eq'},{t:'ans',v:sum}])}${numRow([{t:'num',v:'★'},{t:'op',v:'−'},{t:'num',v:'□'},{t:'eq'},{t:'ans',v:diff}])}<div style="font-size:9px;color:#4b5563;font-family:var(--px);margin-top:4px">Find ${askStar?'★':'□'} = ?</div></div>`,
      a:String(ans),ch:mkC(ans,[askStar?box:star,ans+1,ans+2])};
  },
};

/* ── TTS: always uses q.tts if present; pattern gets its own treatment ── */
function qTTS(q){
  if(!q)return'';
  if(q.tts)return q.tts;
  if(q.type==='pattern'){
    const seq=q.seq.map(n=>n===null?'blank':n).join(', ');
    return`The sequence is: ${seq}. What is the missing number?`;
  }
  return'What is the answer?';
}

function diff(rId,lIdx){return clamp(2+rId+Math.floor(lIdx/3),2,9);}
const DIFF_CAPS=[3,6,99];

function genQ(d){
  const allTypes=d<=2?['add','sub','word','clock','pattern']:
                 d<=4?['add','sub','word','multistep','pattern','money','mul']:
                 ['mul','div','word','multistep','algebra','money','pattern','clock'];
  let types=allTypes.filter(t=>S.topicEnabled[t]!==false);
  if(!types.length)types=allTypes;
  const wts=types.map(t=>S.weights[t]||1),tot=wts.reduce((a,b)=>a+b,0);
  let r=Math.random()*tot,type=types[types.length-1];
  for(let i=0;i<types.length;i++){r-=wts[i];if(r<=0){type=types[i];break;}}
  const cap=DIFF_CAPS[S.topicDiffLevel[type]??2];
  const effectiveD=Math.min(d,cap);
  return GENS[type](effectiveD);
}

function buildQs(d,n){
  const used=new Set();const qs=[];let attempts=0;
  while(qs.length<n&&attempts<n*40){
    attempts++;const q=genQ(d);
    if(!used.has(q.key)){used.add(q.key);qs.push(q);}
  }
  while(qs.length<n)qs.push(genQ(d));
  return qs;
}
function genBossQ(){
  let q,attempts=0;
  do{q=genQ(diff(S.region,10));attempts++;}
  while(S.bossUsedKeys.has(q.key)&&attempts<40);
  S.bossUsedKeys.add(q.key);return q;
}

function addStat(type,ok){
  if(!S.stats[type])S.stats[type]={correct:0,total:0};
  S.stats[type].total++;
  if(ok)S.stats[type].correct++;
  else S.weights[type]=(S.weights[type]||1)+2;
}

const CBGS=['#E52521','#049CD8','#43B047','#e78c00'];
const CBDR=['#B01E19','#037BA0','#2E7D32','#b56800'];
function renderQ(q,iconId,bodyId,choicesId,onAnswer){
  const ic=$(iconId),bd=$(bodyId),ch=$(choicesId);

  }else if(q.type==='pattern'){

/* ── CASTLE ── */
function totalLevels(){return[...S.completed].length;}
function bossCount(){return S.bossDefeated.size;}
function partState(p){
  if(S.builtParts.has(p.id)||p.free)return'built';
  const met=!p.req||(
    (p.req.levels===undefined||totalLevels()>=p.req.levels)&&
    (p.req.boss===undefined  ||bossCount()>=p.req.boss));
  if(!met)return'locked';
  if(p.cost===0)return'auto';
  if(S.coins>=p.cost)return'avail';
  return'need-coins';
}
function autoBuiltCheck(){
  let any=false;
  CASTLE_PARTS.forEach(p=>{if(S.builtParts.has(p.id))return;if(partState(p)==='auto'){S.builtParts.add(p.id);S.newUnlocks.push(p);any=true;}});
  if(any)save();return any;
}
function availableCount(){return CASTLE_PARTS.filter(p=>!S.builtParts.has(p.id)&&partState(p)==='avail').length;}

  speakBoss(t);
  setTimeout(()=>b.style.display='none',d);

function loadBossQ(){
  S.bossQ=genBossQ();S.bossAnswered=false;
  renderQ(S.bossQ,'bq-icon','bq-body','b-choices',(choice,btn)=>{
    if(S.bossAnswered)return;S.bossAnswered=true;
    const ok=choice===S.bossQ.a;addStat(S.bossQ.type,ok);
    document.querySelectorAll('#b-choices .choice-btn').forEach(b=>{
      b.disabled=true;
      if(b.textContent===S.bossQ.a)b.classList.add('ok');
      else if(b===btn&&!ok)b.classList.add('ng');
    });
    if(ok){
      S.bossHP--;S.coins+=2;S.totalCoins+=2;save();
      sfx('boss');
      const spr=$('boss-spr');
      spr.classList.add('boss-hit');
      setTimeout(()=>spr.classList.remove('boss-hit'),380);
      showBubble(pick(BOSS_HURT),2200);
      toast('b-toast','⚔️ HIT! +2🪙',1100);
    }else{
      S.playerHP--;sfx('ng');
      showBubble(pick(BOSS_TAUNT),1800);
    }
    updateBossHUD();
    setTimeout(()=>{if(ok&&S.bossHP<=0)bossWin();else if(!ok&&S.playerHP<=0)bossLose();else loadBossQ();},1400);
  });
}
function bossWin(){
  const w=WORLDS[S.region];S.bossDefeated.add(S.region);
  S.badges=[...S.badges.filter(b=>b.name!==w.badge.name),w.badge];
  if(S.region<WORLDS.length-1)S.maxUnlock[S.region+1]=S.maxUnlock[S.region+1]??0;
  const hadUnlocks=autoBuiltCheck();save();sfx('power');confetti();
  speak(w.win,1.4,1.0);stopBg();playBg('w'+S.region);
  $('bv-icon').textContent=w.badge.e;$('bv-sub').textContent=w.name+' conquered!';
  $('bv-badge').innerHTML=`<span style="font-size:3rem">${w.badge.e}</span><div><div style="font-size:6px;color:#aaa">NEW BADGE!</div><div style="font-size:9px;color:var(--gold);margin-top:3px">${w.badge.name}</div><div style="font-family:system-ui;font-size:11px;color:#ccc;margin-top:2px">${w.badge.desc}</div></div>`;
  $('bv-castle-unlock').textContent=hadUnlocks?'🏰 New castle parts unlocked!':'';
  const btns=$('bv-btns');btns.innerHTML='';
  [{l:'🏰 BUILD',fn:()=>{sfx('warp');initBuilder();goTo('builder');},bg:'#4338ca'},
   {l:'🏠 HOME',fn:()=>{sfx('warp');stopBg();playBg('home');initHome();goTo('home');},bg:'#374151'},
   ...(S.region<WORLDS.length-1?[{l:'NEXT 🌍',fn:()=>{S.region++;playBg('w'+S.region);initRegion();goTo('region');},bg:'#15803d'}]:[]),
  ].forEach(({l,fn,bg})=>{
    const b=el('div',`background:${bg};border-radius:6px;padding:12px 16px;font-size:7px;color:#fff;cursor:pointer;`,l,{class:'pb'});

  });
  goTo('bvic');
}
function bossLose(){

function overallAcc(){
  const tot=Object.values(S.stats).reduce((s,v)=>s+(v.total||0),0);
  const cor=Object.values(S.stats).reduce((s,v)=>s+(v.correct||0),0);
  return tot>0?Math.round(cor/tot*100):0;
}

        btn.textContent=label;
        const _i=i;
        btn.onclick=()=>{sfx('tick');S.topicDiffLevel[key]=_i;save();renderParContent();};
        diffRow.appendChild(btn);
      });
      card.appendChild(diffRow);
      const descRow=el('div','margin-top:6px;display:flex;gap:4px;');
      TDIFF_DESC[key].forEach((desc,i)=>{
        descRow.appendChild(el('div',`flex:1;font-size:9px;color:${i===dlevel?DCOLORS[i]:'#cbd5e1'};text-align:center;line-height:1.3;font-weight:${i===dlevel?700:400};`,desc));
      });
      card.appendChild(descRow);
    }
    c.appendChild(card);
  });

  const disabledCount=topicOrder.filter(k=>S.topicEnabled[k]===false).length;
  if(disabledCount>=8){
    c.appendChild(el('div','background:#fef2f2;border:2px solid #fecaca;border-radius:12px;padding:14px;text-align:center;margin-top:4px;',
      `<div style="font-size:1.4rem;margin-bottom:6px">⚠️</div><div style="font-size:12px;font-weight:700;color:#dc2626;">Only ${topicOrder.length-disabledCount} topic${topicOrder.length-disabledCount!==1?'s':''} enabled — please enable more for variety!</div>`
    ));
  }
  c.appendChild(el('div','background:#eff6ff;border:2px solid #bfdbfe;border-radius:12px;padding:14px;margin-top:6px;',
    `<div style="font-size:12px;font-weight:700;color:#1d4ed8;margin-bottom:6px">How difficulty works</div><div style="font-family:system-ui;font-size:11px;color:#3b82f6;line-height:1.6;"><b>Easy</b> keeps numbers small, such as multiplying within the 2 to 6 times tables. <b>Medium</b> covers the standard school range. <b>Hard</b> unlocks the full challenge as the worlds progress. Multiplication and division are set to Medium by default.</div>`
  ));
}

function renderParOverview(c){
  const tot=Object.values(S.stats).reduce((s,v)=>s+(v.total||0),0),cor=Object.values(S.stats).reduce((s,v)=>s+(v.correct||0),0),acc=tot>0?Math.round(cor/tot*100):0;
  const grid=el('div','display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;');
  [{i:'📝',v:tot,l:'Questions'},{i:'✅',v:cor,l:'Correct'},{i:'🎯',v:acc+'%',l:'Accuracy'},{i:'🪙',v:S.totalCoins,l:'Coins'},{i:'🏆',v:S.badges.length,l:'Badges'},{i:'🏰',v:S.builtParts.size,l:'Castle Parts'}].forEach(({i,v,l})=>{grid.appendChild(el('div','background:#fff;border-radius:12px;padding:14px 6px;text-align:center;box-shadow:0 1px 6px rgba(0,0,0,.06)',`<div style="font-size:1.6rem">${i}</div><div style="font-size:18px;font-weight:900;color:#1e293b;margin-top:4px">${v}</div><div style="font-size:10px;color:#94a3b8;font-weight:600">${l}</div>`));});
  c.appendChild(grid);
  const chartData=Object.entries(S.stats).filter(([,v])=>v.total>0).map(([k,v])=>({name:TINFO[k]?.s||k,acc:Math.round(v.correct/v.total*100),total:v.total,icon:TINFO[k]?.i||'❓'}));
  if(chartData.length>0){
    const chart=el('div','background:#fff;border-radius:16px;padding:16px;margin-bottom:14px;box-shadow:0 1px 6px rgba(0,0,0,.06)');
    chart.innerHTML='<div style="font-size:13px;font-weight:900;color:#1e293b;margin-bottom:12px">📊 Accuracy by Topic</div>';
    chartData.forEach(d=>{const col=d.acc>=80?'#22c55e':d.acc>=60?'#eab308':'#ef4444';chart.innerHTML+=`<div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;font-size:10px;font-weight:700;color:#475569;margin-bottom:3px"><span>${d.icon} ${d.name} (${d.total}q)</span><span style="color:${col}">${d.acc}%</span></div><div style="height:10px;background:#f1f5f9;border-radius:5px;overflow:hidden"><div style="height:100%;width:${d.acc}%;background:${col};border-radius:5px;"></div></div></div>`;});
    c.appendChild(chart);
  }
  c.appendChild(el('div','',`<button onclick="resetAll()" style="width:100%;background:#fef2f2;border:1px solid #fecaca;color:#dc2626;border-radius:12px;padding:14px;font-weight:700;font-size:12px;cursor:pointer">🗑️ Reset All Save Data</button>`));
}
function renderParWeak(c){
  const weak=Object.entries(S.stats).filter(([,v])=>v.total>=2&&v.correct/v.total<.65).map(([k,v])=>({key:k,label:TINFO[k]?.l||k,icon:TINFO[k]?.i||'❓',pct:Math.round(v.correct/v.total*100)})).sort((a,b)=>a.pct-b.pct);
  if(!Object.keys(S.stats).length){c.innerHTML='<div style="text-align:center;color:#94a3b8;padding:40px 0;font-size:14px">Play some levels first!</div>';return;}
  if(!weak.length){c.innerHTML='<div style="background:#f0fdf4;border-radius:16px;padding:24px;text-align:center"><div style="font-size:3rem;margin-bottom:8px">🏆</div><div style="font-size:16px;font-weight:900;color:#15803d">All topics are above 65%!</div></div>';return;}
  weak.forEach(w=>{const col=w.pct<40?'#ef4444':w.pct<60?'#f97316':'#eab308';c.appendChild(el('div','background:#fff;border-radius:16px;padding:16px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.06)',`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px"><span style="font-size:14px;font-weight:900;color:#1e293b;display:flex;align-items:center;gap:8px"><span style="font-size:1.4rem">${w.icon}</span>${w.label}</span><span style="font-weight:900;font-size:13px;padding:4px 10px;border-radius:20px;background:${col}22;color:${col}">${w.pct}%</span></div><div style="height:6px;background:#f1f5f9;border-radius:3px;overflow:hidden;margin-bottom:8px"><div style="height:100%;width:${w.pct}%;background:${col};border-radius:3px"></div></div><div style="font-size:11px;color:#64748b">💡 ${SUGG[w.key]||'Practice this topic regularly!'}</div>`));});
}
function renderParLog(c){
  const n=S.wrongLog.length;const hdr=el('div','display:flex;align-items:center;justify-content:space-between;margin-bottom:12px');
  hdr.innerHTML=`<div style="font-size:12px;font-weight:700;color:#475569">${n} wrong answer${n!==1?'s':''}</div>`;
  if(n>0){const clr=el('button','background:#fef2f2;border:1px solid #fecaca;color:#dc2626;padding:6px 12px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer','🗑️ Clear');clr.onclick=()=>{S.wrongLog=[];save();renderParContent();};hdr.appendChild(clr);}
  c.appendChild(hdr);
  if(!n){c.innerHTML+='<div style="text-align:center;color:#94a3b8;padding:40px 0;font-size:14px">No wrong answers yet!</div>';return;}
  S.wrongLog.slice(0,80).forEach(w=>{c.appendChild(el('div','background:#fff;border-radius:16px;padding:14px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.06)',`<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><span style="font-size:1.2rem">${w.i}</span><div style="flex:1"><div style="font-size:11px;font-weight:700;color:#475569">${TINFO[w.type]?.l||w.type}</div><div style="font-size:10px;color:#94a3b8">${w.world} · ${w.level}</div></div><div style="font-size:10px;color:#cbd5e1">${w.time}</div></div><div style="font-size:11px;color:#334155;white-space:pre-line;background:#f8fafc;border-radius:8px;padding:8px;margin-bottom:8px;line-height:1.6">${w.q}</div><div style="display:flex;gap:8px"><div style="flex:1;background:#fef2f2;border-radius:8px;padding:8px;text-align:center"><div style="font-size:10px;color:#f87171;font-weight:700">Given</div><div style="font-size:16px;font-weight:900;color:#dc2626">${w.given}</div></div><div style="flex:1;background:#f0fdf4;border-radius:8px;padding:8px;text-align:center"><div style="font-size:10px;color:#4ade80;font-weight:700">Correct</div><div style="font-size:16px;font-weight:900;color:#16a34a">${w.correct}</div></div></div>`));});
}
window.resetAll=function(){if(!confirm('Reset all save data?'))return;try{localStorage.removeItem(SK);}catch{}location.reload();};
