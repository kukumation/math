<!DOCTYPE html><html lang="en"><head><meta name="x-poe-datastore-behavior" content="local_only"><meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' data: blob: https://cdnjs.cloudflare.com https://cdn.jsdelivr.net https://code.jquery.com https://unpkg.com https://d3js.org https://threejs.org https://cdn.plot.ly https://stackpath.bootstrapcdn.com https://maps.googleapis.com https://cdn.tailwindcss.com https://ajax.googleapis.com https://kit.fontawesome.com https://cdn.datatables.net https://maxcdn.bootstrapcdn.com https://code.highcharts.com https://tako-static-assets-production.s3.amazonaws.com https://www.youtube.com https://fonts.googleapis.com https://fonts.gstatic.com https://pfst.cf2.poecdn.net https://puc.poecdn.net https://i.imgur.com https://wikimedia.org https://*.icons8.com https://*.giphy.com https://picsum.photos https://images.unsplash.com; frame-src 'self' https://www.youtube.com https://trytako.com; child-src 'self'; manifest-src 'self'; worker-src 'self'; upgrade-insecure-requests; block-all-mixed-content;">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Castle Math Quest 🏰</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&amp;display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#FBD000;--red:#E52521;--green:#43B047;--px:'Press Start 2P',monospace;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:var(--px);}
#app{width:100%;height:100%;max-width:480px;margin:0 auto;position:relative;overflow:hidden;}
.scr{display:none;position:absolute;inset:0;flex-direction:column;overflow-y:auto;overflow-x:hidden;}
.scr.on{display:flex;}
.pb{cursor:pointer;border:3px solid #000;box-shadow:4px 4px 0 #000;transition:transform .07s,box-shadow .07s;user-select:none;outline:none;-webkit-tap-highlight-color:transparent;display:inline-flex;align-items:center;justify-content:center;}
.pb:active{transform:translate(3px,3px);box-shadow:1px 1px 0 #000}
.wb0{background:linear-gradient(180deg,#56A8E5 0%,#7EC8A4 45%,#4DB36A 70%,#2E7D32 100%);}
.wb1{background:linear-gradient(180deg,#0077B6 0%,#00B4D8 40%,#48CAE4 65%,#1A5276 100%);}
.wb2{background:linear-gradient(180deg,#1a0000 0%,#7B0E00 35%,#CC3300 60%,#FF6600 85%,#1a0a00 100%);}
.wb3{background:linear-gradient(180deg,#E0F4FF 0%,#B3D9FF 40%,#8EC6FF 70%,#1A3A5C 100%);}
.wb4{background:linear-gradient(180deg,#F0F9FF 0%,#87CEEB 30%,#E0F4FF 60%,#B3D9FF 85%,#2A6A9A 100%);}
.wb5{background:linear-gradient(180deg,#050010 0%,#1a0050 30%,#3d0080 60%,#0d0020 100%);}
.wb6{background:linear-gradient(180deg,#001a00 0%,#003300 40%,#005500 70%,#001a00 100%);}
.wb7{background:linear-gradient(180deg,#1a0a00 0%,#3d1500 40%,#7a3000 70%,#1a0a00 100%);}
.wb8{background:linear-gradient(180deg,#00001a 0%,#000033 40%,#000066 70%,#00001a 100%);}
.wb-dark{background:linear-gradient(180deg,#0F0527,#1a0050,#0F0527);}
.wb-boss{background:linear-gradient(180deg,#0d0000,#3d0000,#7a0000,#0d0000);}
.hud{background:rgba(0,0,0,.9);border-bottom:3px solid #333;padding:10px 14px;display:flex;align-items:center;gap:8px;flex-shrink:0;position:sticky;top:0;z-index:100;backdrop-filter:blur(4px);}
.coin-orb{width:22px;height:22px;border-radius:50%;flex-shrink:0;background:radial-gradient(circle at 35% 35%,#FFE57A,#FBD000 60%,#E65100);border:2px solid #E65100;box-shadow:2px 2px 0 #000;}
.q-card{background:linear-gradient(145deg,#FFD54F,#FBD000,#F9A825);border:4px solid #E65100;box-shadow:6px 6px 0 #000,inset 3px 3px 0 rgba(255,255,255,.4);border-radius:10px;padding:20px 16px;position:relative;width:100%;}
.choice-btn{border-radius:8px;border:3px solid #000;box-shadow:5px 5px 0 #000;font-family:var(--px);font-size:16px;color:#fff;text-shadow:2px 2px 0 rgba(0,0,0,.5);padding:18px 8px;cursor:pointer;transition:transform .07s,box-shadow .07s;-webkit-tap-highlight-color:transparent;outline:none;width:100%;}
.choice-btn:active{transform:translate(3px,3px);box-shadow:2px 2px 0 #000;}
.choice-btn.ok{background:#43B047!important;border-color:#2E7D32!important;}
.choice-btn.ng{background:#E52521!important;border-color:#B71C1C!important;}
.prog-track{height:12px;background:#222;border:2px solid #444;border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,#FBD000,#FFD54F);transition:width .4s ease;}
.lv-card{border-radius:12px;padding:14px 8px;border:3px solid rgba(0,0,0,.4);box-shadow:4px 4px 0 rgba(0,0,0,.7);cursor:pointer;display:flex;flex-direction:column;align-items:center;text-align:center;gap:5px;min-height:120px;justify-content:center;transition:transform .08s,box-shadow .08s;user-select:none;-webkit-tap-highlight-color:transparent;}
.lv-card:active:not(.lv-locked){transform:translate(3px,3px);box-shadow:1px 1px 0 rgba(0,0,0,.7);}
.lv-card.lv-locked{cursor:default;opacity:.5;}
.lv-card.lv-current{animation:pulse-lv 1.1s ease-in-out infinite;}
@keyframes pulse-lv{0%,100%{box-shadow:4px 4px 0 rgba(0,0,0,.7)}50%{box-shadow:4px 4px 0 rgba(0,0,0,.7),0 0 0 5px rgba(255,255,255,.25)}}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(16px);background:#0d0d0d;color:var(--gold);font-size:12px;padding:10px 18px;border-radius:8px;border:3px solid var(--gold);box-shadow:4px 4px 0 rgba(0,0,0,.5);opacity:0;transition:opacity .2s,transform .2s;z-index:500;text-align:center;max-width:300px;white-space:pre-line;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
@keyframes cpop{0%{opacity:1;transform:translateY(0) scale(.5)}60%{opacity:1;transform:translateY(-36px) scale(1.2)}100%{opacity:0;transform:translateY(-64px) scale(.8)}}
.cpop{position:fixed;pointer-events:none;z-index:600;font-family:var(--px);font-size:14px;color:var(--gold);text-shadow:2px 2px 0 #000;animation:cpop .9s ease-out forwards;}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes conffall{0%{transform:translate(0,0) rotate(0);opacity:1}100%{transform:translate(var(--dx),var(--dy)) rotate(var(--rot));opacity:0}}
.confetti{position:fixed;pointer-events:none;z-index:700;font-size:20px;animation:conffall 1.6s ease-out forwards;}
.bounce{animation:bounce 1s ease-in-out infinite;}
.blink{animation:blink 1s step-start infinite;}
.num-display{font-size:20px;color:#1e1b4b;font-family:var(--px);background:#fff;border-radius:7px;padding:7px 13px;border:3px solid #e0e7ff;box-shadow:inset 2px 2px 0 rgba(0,0,0,.07);display:inline-block;min-width:44px;text-align:center;}
.op-sign{font-size:20px;color:#7c3aed;font-family:var(--px);}
.eq-row{display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap;}
.blank-box{font-size:20px;color:#a855f7;font-family:var(--px);background:#f3e8ff;border-radius:7px;padding:7px 13px;border:3px dashed #a855f7;display:inline-block;min-width:54px;text-align:center;}
#fire-overlay{position:fixed;inset:0;pointer-events:none;z-index:6;overflow:hidden;}
.fp{position:absolute;font-size:var(--sz);animation:fire-rise var(--dur) ease-out var(--del) infinite;pointer-events:none;}
@keyframes fire-rise{0%{transform:translateY(0) scale(1);opacity:.9}100%{transform:translateY(-60px) scale(.3);opacity:0}}
@keyframes ach-glow{0%,100%{box-shadow:0 8px 32px rgba(0,0,0,.5),0 0 20px var(--ac)}50%{box-shadow:0 8px 32px rgba(0,0,0,.5),0 0 45px var(--ac)}}
.ach-card{display:flex;align-items:center;gap:14px;padding:16px;border-radius:16px;border:3px solid var(--ac);animation:ach-glow 1.2s ease-in-out infinite;}
.sheet{background:linear-gradient(180deg,#1a1a2e,#16213e);border-radius:22px 22px 0 0;border-top:4px solid #4f46e5;position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;z-index:400;box-shadow:0 -8px 32px rgba(0,0,0,.8);transition:transform .3s ease;max-height:82vh;display:flex;flex-direction:column;}
.sheet.off{transform:translateX(-50%) translateY(100%);}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:399;display:none;}
.overlay.on{display:block;}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px}
.topic-toggle{width:48px;height:26px;border-radius:13px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0;}
.topic-toggle-knob{width:22px;height:22px;background:#fff;border-radius:50%;position:absolute;top:2px;transition:left .2s;box-shadow:0 1px 4px rgba(0,0,0,.3);}
.shop-item{background:rgba(255,255,255,.04);border:2px solid #333;border-radius:14px;padding:14px 10px;display:flex;flex-direction:column;align-items:center;text-align:center;gap:6px;cursor:pointer;transition:border-color .15s;}
.shop-item:hover{border-color:#FBD000;}
.shop-item.owned{border-color:#22c55e;background:rgba(34,197,94,.08);}
.hammer-slot{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:4px;font-size:13px;}
.hammer-slot.filled{background:rgba(251,208,0,.2);border:2px solid #FBD000;}
.hammer-slot.empty{background:rgba(255,255,255,.05);border:2px dashed #444;}
.regen-pill{display:inline-flex;align-items:center;gap:4px;background:rgba(239,68,68,.2);border:2px solid #f87171;border-radius:20px;padding:3px 8px;font-size:10px;color:#f87171;}
#practice-modal{position:fixed;inset:0;z-index:800;display:none;align-items:center;justify-content:center;padding:16px;background:rgba(0,0,0,.85);}
#practice-modal.on{display:flex;}
#practice-box{background:linear-gradient(180deg,#1a1a2e,#0f0f1e);border:3px solid #4f46e5;border-radius:20px;width:100%;max-width:440px;max-height:90vh;overflow-y:auto;padding:20px;}
.decor-slot{border-radius:14px;padding:12px 6px;text-align:center;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;min-height:80px;transition:transform .08s;}
.decor-slot:active{transform:scale(.95);}
</style>
</head>
<body>
<div id="app">

<!-- HOME -->
<div id="s-home" class="scr wb-dark" style="padding-bottom:36px;">
  <div style="position:relative;z-index:10;padding:36px 16px 0;">
    <div style="text-align:center;margin-bottom:22px;">
      <div style="font-size:16px;color:var(--gold);text-shadow:3px 3px 0 #E65100,5px 5px 0 #000;line-height:2.2;letter-spacing:2px;">CASTLE<br>MATH QUEST</div>
      <div class="blink" style="font-size:10px;color:#fff;margin-top:6px;">— TAP A WORLD TO BEGIN —</div>
    </div>
    <div id="home-stats" style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px;"></div>
    <div id="home-regen-bar" style="margin-bottom:12px;"></div>
    <div id="btn-kingdom" class="pb" style="background:linear-gradient(135deg,#4338ca,#7c3aed);border-radius:12px;padding:14px;display:flex;align-items:center;gap:12px;margin-bottom:16px;">
      <div style="font-size:2rem;">🏰</div>
      <div style="flex:1;"><div style="font-size:11px;color:#fff;">MY KINGDOM</div><div id="k-sub" style="font-size:9px;color:#c4b5fd;margin-top:3px;"></div></div>
      <div id="k-notify" style="display:none;width:12px;height:12px;background:#00ff88;border-radius:50%;box-shadow:0 0 8px #00ff88;animation:bounce 1s ease infinite;"></div>
      <div style="font-size:18px;color:rgba(255,255,255,.5);">›</div>
    </div>
    <div id="world-list" style="display:flex;flex-direction:column;gap:10px;"></div>
    <div id="btn-parent" class="pb" style="background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.15);border-radius:10px;padding:14px;display:flex;align-items:center;justify-content:center;gap:10px;margin-top:16px;">
      <span style="font-size:1.4rem;">📊</span><span style="font-size:10px;color:#fff;">PARENT DASHBOARD</span><span style="opacity:.4;font-size:1rem;">🔒</span>
    </div>
    <div id="home-aud" style="position:fixed;top:14px;right:14px;z-index:200;"></div>
  </div>
</div>

<!-- REGION -->
<div id="s-region" class="scr">
  <div id="map-hdr" style="position:sticky;top:0;z-index:30;background:rgba(0,0,0,.82);backdrop-filter:blur(8px);border-bottom:3px solid rgba(255,255,255,.1);flex-shrink:0;padding:40px 14px 14px;">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;">
      <div id="btn-map-back" class="pb" style="width:44px;height:44px;background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.25);border-radius:50%;font-size:22px;color:#fff;flex-shrink:0;">‹</div>
      <div style="flex:1;min-width:0;"><div id="map-wname" style="font-size:12px;color:#fff;"></div><div id="map-wsub" style="font-family:system-ui;font-size:13px;color:rgba(255,255,255,.55);margin-top:3px;"></div></div>
      <div id="map-badge-icon" style="font-size:2.2rem;flex-shrink:0;"></div>
      <div id="map-aud" style="flex-shrink:0;"></div>
    </div>
    <div id="map-stat-row" style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;"></div>
  </div>
  <div style="flex:1;overflow-y:auto;overflow-x:hidden;position:relative;z-index:10;">
    <div id="map-canvas" style="padding:14px 14px 28px;"></div>
  </div>
</div>

<!-- GAME -->
<div id="s-game" class="scr">
  <div id="fire-overlay"></div>
  <div class="hud">
    <div id="g-world" style="font-size:9px;color:#aaa;line-height:1.7;min-width:44px;"></div>
    <div style="display:flex;align-items:center;gap:5px;"><div class="coin-orb bounce"></div><div id="g-coins" style="font-size:12px;color:var(--gold);font-weight:bold;"></div></div>
    <div id="g-lives" style="display:flex;gap:3px;align-items:center;"></div>
    <div id="g-regen" class="regen-pill" style="display:none;"></div>
    <div id="g-combo" style="display:none;font-size:10px;padding:3px 10px;border-radius:14px;border:2px solid #f97316;background:rgba(249,115,22,.2);color:#fed7aa;font-family:var(--px);"></div>
    <div style="flex:1;"></div>
    <div id="g-aud"></div>
  </div>
  <div id="g-band" style="padding:8px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0;">
    <div id="g-lname" style="font-size:9px;color:#fff;flex:1;"></div>
    <div class="prog-track" style="width:72px;"><div id="g-prog" class="prog-fill" style="width:0%;"></div></div>
    <div id="g-qnum" style="font-size:9px;color:#fff;"></div>
  </div>
  <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 14px;gap:12px;overflow:hidden;">
    <div id="q-card" class="q-card" style="max-width:380px;min-height:130px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;">
      <div id="q-icon" style="font-size:2.8rem;margin-bottom:6px;"></div>
      <div id="q-body"></div>
    </div>
    <div id="choices" style="display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:380px;"></div>
  </div>
  <div id="g-toast" class="toast"></div>
  <div id="g-cpops"></div>
</div>

<!-- LEVEL FAIL -->
<div id="s-fail" class="scr wb-boss" style="align-items:center;justify-content:center;padding:32px 20px;text-align:center;">
  <div style="font-size:5rem;margin-bottom:14px;">💔</div>
  <div style="font-size:14px;color:#f87171;text-shadow:3px 3px 0 #000;margin-bottom:8px;">OUT OF HEARTS!</div>
  <div id="fail-sub" style="font-size:11px;color:#888;margin-bottom:12px;line-height:2;"></div>
  <div id="fail-regen-box" style="background:rgba(0,0,0,.4);border:2px solid #444;border-radius:12px;padding:14px;margin-bottom:14px;width:100%;max-width:340px;"></div>
  <div id="fail-btns" style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;width:100%;max-width:360px;"></div>
</div>

<!-- BOSS -->
<div id="s-boss" class="scr wb-boss">
  <div style="padding:36px 14px 10px;flex-shrink:0;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
      <div id="btn-boss-back" class="pb" style="width:44px;height:44px;background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.2);border-radius:50%;font-size:22px;color:#fff;">‹</div>
      <div style="text-align:center;"><div style="font-size:10px;color:#f87171;letter-spacing:3px;">BOSS BATTLE</div><div id="boss-name" style="font-size:12px;color:var(--gold);margin-top:3px;"></div></div>
      <div style="display:flex;align-items:center;gap:6px;"><div id="boss-php"></div><div id="boss-aud"></div></div>
    </div>
    <div style="background:#111;border:2px solid #333;border-radius:8px;padding:10px;margin-bottom:10px;">
      <div style="display:flex;justify-content:space-between;font-size:9px;color:#f87171;margin-bottom:4px;"><span>BOSS HP</span><span id="boss-hp-txt"></span></div>
      <div style="height:16px;background:#1a0505;border:2px solid #7f1d1d;border-radius:3px;overflow:hidden;margin-bottom:8px;"><div id="boss-hp-bar" style="height:100%;background:linear-gradient(90deg,#dc2626,#f97316);transition:width .4s;"></div></div>
      <div style="display:flex;justify-content:space-between;font-size:9px;color:#fbbf24;margin-bottom:4px;"><span>TIME LEFT</span><span id="boss-timer-num" style="font-size:14px;font-weight:bold;"></span></div>
      <div style="height:10px;background:#1a1a00;border:2px solid #555;border-radius:5px;overflow:hidden;"><div id="boss-timer-bar" style="height:100%;background:linear-gradient(90deg,#22c55e,#eab308,#ef4444);border-radius:5px;transition:width 1s linear;"></div></div>
    </div>
    <div style="position:relative;text-align:center;margin-bottom:4px;">
      <div id="boss-spr" class="bounce" style="font-size:5rem;display:inline-block;"></div>
      <div id="boss-bubble" style="display:none;position:absolute;left:50%;transform:translateX(-50%);bottom:calc(100% + 6px);background:#1a1a1a;border:2px solid #7f1d1d;border-radius:10px;padding:8px 14px;font-size:10px;color:#fff;white-space:nowrap;z-index:20;"></div>
    </div>
  </div>
  <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 14px 14px;gap:10px;overflow:hidden;">
    <div id="bq-card" style="width:100%;max-width:380px;padding:18px;min-height:110px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;background:#1c0808;border:4px solid #7f1d1d;box-shadow:6px 6px 0 #000;border-radius:10px;">
      <div id="bq-icon" style="font-size:2.8rem;margin-bottom:6px;"></div>
      <div id="bq-body" style="color:#fff;"></div>
    </div>
    <div id="b-choices" style="display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:380px;"></div>
    <div id="b-toast" class="toast"></div>
  </div>
</div>

<!-- VICTORY -->
<div id="s-victory" class="scr wb0" style="align-items:center;justify-content:center;padding:32px 20px;text-align:center;">
  <div id="vic-icon" style="font-size:5rem;margin-bottom:14px;"></div>
  <div style="font-size:14px;color:#fff;text-shadow:3px 3px 0 #000;margin-bottom:6px;">LEVEL CLEAR!</div>
  <div id="vic-lname" style="font-size:10px;color:var(--gold);text-shadow:2px 2px 0 #000;margin-bottom:14px;"></div>
  <div id="vic-stars" style="display:flex;gap:8px;justify-content:center;margin-bottom:14px;"></div>
  <div id="vic-coins" class="pb" style="background:rgba(0,0,0,.5);border-radius:10px;padding:10px 24px;font-size:12px;color:var(--gold);margin-bottom:8px;"></div>
  <div id="vic-hp-status" style="font-size:10px;color:#f87171;margin-bottom:6px;min-height:18px;"></div>
  <div id="vic-combo-best" style="font-size:9px;color:#f97316;margin-bottom:8px;min-height:16px;"></div>
  <div id="vic-unlock" style="font-size:9px;color:#00ff88;margin-bottom:20px;min-height:16px;"></div>
  <div id="vic-btns" style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;"></div>
</div>

<!-- BOSS VICTORY -->
<div id="s-bvic" class="scr" style="background:linear-gradient(135deg,#0d0030,#3d0080,#700090);align-items:center;justify-content:center;padding:32px 20px;text-align:center;">
  <div id="bv-icon" class="bounce" style="font-size:6rem;margin-bottom:14px;"></div>
  <div style="font-size:14px;color:var(--gold);text-shadow:4px 4px 0 #000;margin-bottom:8px;">BOSS CLEARED!</div>

var _regenInterval=null;
function applyPendingRegen(){
  if(S.hp>=S.maxHp){S.hpRegenAt=null;return;}
  if(!S.hpRegenAt){S.hpRegenAt=Date.now()+HP_REGEN_MS;save();return;}
  var now=Date.now();
  while(S.hp<S.maxHp&&now>=S.hpRegenAt){
    S.hp=Math.min(S.hp+1,S.maxHp);
    S.hpRegenAt=S.hp<S.maxHp?S.hpRegenAt+HP_REGEN_MS:null;
  }
  save();
}
function startRegenTimer(){
  if(_regenInterval)return;
  _regenInterval=setInterval(function(){
    if(S.hp>=S.maxHp){S.hpRegenAt=null;updateRegenUI();return;}
    if(!S.hpRegenAt){S.hpRegenAt=Date.now()+HP_REGEN_MS;save();}
    if(Date.now()>=S.hpRegenAt){
      S.hp=Math.min(S.hp+1,S.maxHp);
      S.hpRegenAt=S.hp<S.maxHp?Date.now()+HP_REGEN_MS:null;
      save();updateHpUI();updateRegenUI();
      toast('g-toast','Heart restored!',2000);
      if(S.screen==='fail')showFail();
      if(S.screen==='home')initHome();
    }else{
      updateRegenUI();
    }
  },1000);
}
function getRegenCountdown(){
  if(S.hp>=S.maxHp||!S.hpRegenAt)return null;
  var ms=Math.max(0,S.hpRegenAt-Date.now());
  var m=Math.floor(ms/60000);
  var sec=Math.floor((ms%60000)/1000);
  return m+':'+(sec<10?'0'+sec:sec);
}

  var totalBossWins=Object.values(S.bossWins).reduce(function(s,v){return s+(v||0);},0);
  var clk=(S.stats.clock?S.stats.clock.correct:0)+(S.stats.elapsed?S.stats.elapsed.correct:0)+(S.stats.timediff?S.stats.timediff.correct:0);
  var h=new Date().getHours();
  var filledSlots=S.decorSlots.filter(function(x){return x!==null;}).length;
  if(id==='a_first')return tc>=1;
  if(id==='a_c10')return tc>=10;
  if(id==='a_c50')return tc>=50;
  if(id==='a_c100')return tc>=100;
  if(id==='a_c200')return tc>=200;
  if(id==='a_c500')return tc>=500;
  if(id==='a_c1000')return tc>=1000;

  if(id==='a_combo10')return S.maxCombo>=10;
  if(id==='a_combo15')return S.maxCombo>=15;
  if(id==='a_combo20')return S.maxCombo>=20;
  if(id==='a_perfect1')return s3>=1;
  if(id==='a_perfect3')return s3>=3;
  if(id==='a_perfect5')return s3>=5;
  if(id==='a_perfect10')return s3>=10;
  if(id==='a_boss1')return S.bossDefeated.size>=1;
  if(id==='a_boss3')return S.bossDefeated.size>=3;
  if(id==='a_boss6')return S.bossDefeated.size>=6;

function mkC(ans,ws){
  var a=String(ans),pool=[a];
  ws.forEach(function(w){
    var s=String(Math.max(0,Math.round(w)));
    if(s!==a&&pool.indexOf(s)===-1)pool.push(s);
  });
  var n=Math.abs(+ans)+1;
  while(pool.length<4){var s=String(n);if(pool.indexOf(s)===-1)pool.push(s);n++;}
  return shuffle(pool.slice(0,4));
}

function clockSVG(h,m,sz){

  var hp=pt(h%12*30+m*.5,sz*.22),mp=pt(m*6,sz*.32);

function shapeSVG(shape,color,size){
  size=size||56;
  var c=size/2,r=c-5;
  var inner='';
  if(shape==='circle')inner='<circle cx="'+c+'" cy="'+c+'" r="'+r+'" fill="'+color+'" stroke="white" stroke-width="2"/>';
  else if(shape==='square')inner='<rect x="5" y="5" width="'+(size-10)+'" height="'+(size-10)+'" fill="'+color+'" stroke="white" stroke-width="2"/>';
  else if(shape==='triangle')inner='<polygon points="'+c+',5 '+(size-5)+','+(size-5)+' 5,'+(size-5)+'" fill="'+color+'" stroke="white" stroke-width="2"/>';
  else if(shape==='rectangle')inner='<rect x="3" y="'+(c-c/2)+'" width="'+(size-6)+'" height="'+c+'" fill="'+color+'" stroke="white" stroke-width="2"/>';
  else if(shape==='pentagon'){
    var ppts=[];
    for(var pi=0;pi<5;pi++){var pa=(pi*72-90)*Math.PI/180;ppts.push((c+r*Math.cos(pa))+','+(c+r*Math.sin(pa)));}
    inner='<polygon points="'+ppts.join(' ')+'" fill="'+color+'" stroke="white" stroke-width="2"/>';
  }else if(shape==='hexagon'){
    var hpts=[];
    for(var hi=0;hi<6;hi++){var ha=(hi*60-90)*Math.PI/180;hpts.push((c+r*Math.cos(ha))+','+(c+r*Math.sin(ha)));}
    inner='<polygon points="'+hpts.join(' ')+'" fill="'+color+'" stroke="white" stroke-width="2"/>';

    inner='<polygon points="'+c+',5 '+(size-5)+','+c+' '+c+','+(size-5)+' 5,'+c+'" fill="'+color+'" stroke="white" stroke-width="2"/>';
  }
  return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'">'+inner+'</svg>';
}

function addStat(type,ok){

}
function genQ(d){
  var easy=['add','sub','evenodd','compare','clock','length','spatial'];
  var mid=['add','sub','mul','word','pattern','clock','elapsed','length','spatial','logic','money','evenodd'];
  var hard=['mul','div','word','multistep','pattern','elapsed','timediff','logic','money'];
  var pool=d<=2?easy:d<=5?mid:hard;
  pool=pool.filter(function(t){return S.topicEnabled[t]!==false&&GENS[t];});
  if(!pool.length)pool=['add','sub'];
  var filtered=pool.filter(function(t){return S.lastTypes.indexOf(t)===-1;});
  var weighted=filtered.length>0?filtered:pool;
  var wts=weighted.map(function(t){return S.typeWeights[t]||S.weights[t]||1;});
  var tot=wts.reduce(function(a,b){return a+b;},0);
  var rv=Math.random()*tot,type=weighted[weighted.length-1];
  for(var i=0;i<weighted.length;i++){rv-=wts[i];if(rv<=0){type=weighted[i];break;}}
  S.lastTypes=[type].concat(S.lastTypes.slice(0,2));
  var caps=[2,5,8];
  return GENS[type](Math.min(d,caps[clamp(S.topicDiffLevel[type]||1,0,2)]));
}
function buildQs(d,n){
  var used={},qs=[],att=0;
  S.lastTypes=[];
  while(qs.length<n&&att<n*50){
    att++;
    var q=genQ(d);
    if(!used[q.key]){used[q.key]=true;qs.push(q);}
  }
  while(qs.length<n)qs.push(genQ(d));
  return qs;
}
function genBossQ(){

  do{q=genQ(diff(S.region,8));att++;}while(S.bossUsedKeys.has(q.key)&&att<30);

  return q;
}

function startLevel(lIdx){
  if(S.hp<=0){S.level=lIdx;S.levelWrong=0;showFail();return;}
  S.level=lIdx;S.qIdx=0;S.answered=false;S.levelWrong=0;S.combo=0;S.sessionMaxCombo=0;
  var d=diff(S.region,lIdx),w=getWorldData(S.region);
  S.questions=buildQs(d,QPL);audBtn('g-aud');
  $('g-world').innerHTML='<div style="color:#aaa;font-size:8px">W'+(S.region+1)+'-L'+(lIdx+1)+'</div>';
  $('g-coins').textContent=S.coins;
  updateHpUI();
  $('g-band').style.background=w.hdrGrad;$('g-lname').textContent=LNAMES[lIdx];
  $('s-game').className='scr on '+(w.bgClass||'wb-dark');$('s-game').style.boxShadow='none';
  $('fire-overlay').innerHTML='';$('g-combo').style.display='none';bgSpeedMult=1.0;
  checkAchievements();
  goTo('game');loadQ();
}
function updateHpUI(){
  var l=$('g-lives');if(!l)return;
  var html='';
  for(var hi=0;hi<S.maxHp;hi++){
    html+='<span style="font-size:'+(hi<S.hp?'1.2rem':'.9rem')+';opacity:'+(hi<S.hp?1:.2)+'">'+(hi<S.hp?'❤️':'🖤')+'</span>';
  }
  l.innerHTML=html;
}
function loadQ(){
  var q=S.questions[S.qIdx];if(!q)return;S.answered=false;
  $('g-prog').style.width=(S.qIdx/QPL*100)+'%';$('g-qnum').textContent=(S.qIdx+1)+'/'+QPL;
  renderQ(q,'q-icon','q-body','choices',function(choice,btn){
    if(S.answered)return;S.answered=true;
    var ok=choice===q.a;
    addStat(q.type,ok);
    document.querySelectorAll('#choices .choice-btn').forEach(function(b){
      b.disabled=true;
      if(b.textContent===q.a)b.classList.add('ok');
      else if(b===btn&&!ok)b.classList.add('ng');
    });
    if(ok){
      S.combo++;
      if(S.combo>S.maxCombo){S.maxCombo=S.combo;save();}
      if(S.combo>S.sessionMaxCombo)S.sessionMaxCombo=S.combo;
      var mult=getComboMult();
      var earnedBase=(S.shopOwned['xstar']||0)>0?2:1;
      var earned=mult*earnedBase;
      if((S.shopOwned['xstar']||0)>0){S.shopOwned['xstar']=Math.max(0,(S.shopOwned['xstar']||0)-1);}
      S.coins+=earned;S.totalCoins+=earned;$('g-coins').textContent=S.coins;
      coinPop(earned,'g-cpops');sfx(mult>=2?'combo2x':'coin');
      if(S.combo>=4){if(bgSpeedMult<1.25)setMusicSpeed(1.25);if(S.combo===4){sfx('combo2x');speak('Combo times two! Double coins!',1.4,1.0);}}
      else if(S.combo===3){sfx('combo');speak('On fire! Three in a row!',1.3,1.0);}
      updateComboUI();spawnFire(S.combo);
      var msgs=['Wahoo! Correct!','Well done!','Perfect!','Brilliant!'];
      var m=mult>=2?'x'+S.combo+' — 2x COINS!':pick(msgs);
      toast('g-toast',m);if(mult<2)speak(m,1.5,1.1);
      save();checkAchievements();
    }else{
      S.combo=0;S.levelWrong++;setMusicSpeed(1.0);updateComboUI();spawnFire(0);
      S.hp--;updateHpUI();sfx('ng');
      if(!S.hpRegenAt&&S.hp<S.maxHp){S.hpRegenAt=Date.now()+HP_REGEN_MS;}
      S.wrongLog.unshift({type:q.type,i:q.i,q:q.tts||'',display:q.display||null,ch:q.ch||[],correct:q.a,given:choice,world:getWorldData(S.region).name,level:LNAMES[S.level],time:new Date().toLocaleTimeString()});
      if(S.hp<=0){
        toast('g-toast','Out of hearts!',1200);speak('Out of hearts!',0.9,.9);
        setTimeout(function(){S.levelWinStreak=0;save();showFail();},900);
        return;
      }
      toast('g-toast','Correct answer: '+q.a,2000);speak('Not quite! The answer is '+q.a,.9,.95);save();
    }
    setTimeout(function(){
      var ni=S.qIdx+1;
      if(ni>=QPL){
        var tw=S.levelWrong,stars=tw===0?3:tw<=1?2:tw<=2?1:0;
        var starsEarned=(S.shopOwned['xp_scroll']||0)>0?3:stars;
        if((S.shopOwned['xp_scroll']||0)>0){S.shopOwned['xp_scroll']=Math.max(0,(S.shopOwned['xp_scroll']||0)-1);}
        var key=S.region+'-'+S.level;
        S.levelStars[key]=Math.max(S.levelStars[key]||0,starsEarned);
        S.completed.add(key);
        S.maxUnlock[S.region]=Math.max(S.maxUnlock[S.region]||0,S.level<9?S.level+1:10);
        S.levelWinStreak++;S.noPotionCount++;
        var hadUnlocks=autoBuiltCheck();save();checkAchievements();
        if(starsEarned===3)sfx('power');else sfx('done');
        showVictory(starsEarned,hadUnlocks);
      }else{S.qIdx=ni;loadQ();sfx('tick');}
    },ok?1000:1600);
  });
  speak(qTTS(q),1.1,.95);
}
function getComboMult(){return S.combo>3?2:1;}
function updateComboUI(){
  var g=$('g-combo');if(!g)return;
  if(S.combo>=3){g.style.display='flex';g.textContent=S.combo>=4?'x'+S.combo+' — 2x coins':'x'+S.combo+' COMBO';}
  else g.style.display='none';
}

// FAIL SCREEN
function showFail(){
  spawnFire(0);
  var gs=$('s-game');if(gs)gs.style.boxShadow='none';
  var fo=$('fire-overlay');if(fo)fo.innerHTML='';
  bgSpeedMult=1.0;
  $('fail-sub').innerHTML='Level: <b style="color:#fff">'+(LNAMES[S.level]||'?')+'</b> &nbsp; Hearts: <b style="color:#f87171">'+S.hp+'/'+S.maxHp+'</b>';
  renderFailRegenBox();
  var btns=$('fail-btns');btns.innerHTML='';
  if(S.potionStock>0&&S.hp<=0){
    var pb=el('div','background:#15803d;border-radius:10px;padding:14px 18px;font-size:11px;color:#fff;cursor:pointer;width:100%;text-align:center;','USE POTION ('+S.potionStock+' left)',{class:'pb'});
    pb.onclick=function(){
      sfx('power');S.potionStock--;S.hp=S.maxHp;S.hpRegenAt=null;
      S.achievements['a_potion']=Date.now();S.noPotionCount=0;save();checkAchievements();
      speak('Potion used! Hearts fully restored!',1.3,1.0);startLevel(S.level);
    };
    btns.appendChild(pb);
  }
  if(S.coins>=3){
    var bb=el('div','background:#7c3aed;border-radius:10px;padding:14px 18px;font-size:11px;color:#fff;cursor:pointer;width:100%;text-align:center;','BUY POTION (3 coins)',{class:'pb'});
    bb.onclick=function(){sfx('build');S.coins-=3;S.potionStock++;save();speak('Potion purchased!',1.2,1.0);showFail();};
    btns.appendChild(bb);
  }
  var sb=el('div','background:#374151;border-radius:10px;padding:14px 18px;font-size:11px;color:#fff;cursor:pointer;text-align:center;','SHOP',{class:'pb'});
  sb.onclick=function(){sfx('tick');S.blTab='shop';initBuilder();goTo('builder');};
  btns.appendChild(sb);
  var mb=el('div','background:#374151;border-radius:10px;padding:14px 18px;font-size:11px;color:#fff;cursor:pointer;text-align:center;','MAP',{class:'pb'});
  mb.onclick=function(){sfx('tick');initRegion();goTo('region');};
  btns.appendChild(mb);
  goTo('fail');
}
function showVictory(stars,hadUnlocks){
  spawnFire(0);$('s-game').style.boxShadow='none';$('fire-overlay').innerHTML='';bgSpeedMult=1.0;
  goTo('victory');
  $('vic-icon').textContent=stars===3?'🌟':stars>=1?'⭐':'😅';
  $('vic-lname').textContent=LNAMES[S.level];
  $('vic-stars').innerHTML=[0,1,2].map(function(i){return '<span style="font-size:2rem;opacity:'+(i<stars?1:.2)+'">⭐</span>';}).join('');
  var earned=stars===3?6:stars>=1?3:1;
  $('vic-coins').textContent='+'+earned+' COINS EARNED';
  S.coins+=earned;S.totalCoins+=earned;save();checkAchievements();
  if(stars===3){confetti();speak('Three stars! Wahoo!',1.4,1.1);}else speak('Level complete!',1.3,.95);
  $('vic-hp-status').textContent=S.hp<S.maxHp?'Hearts: '+S.hp+'/'+S.maxHp+' (HP carries over!)':'';
  $('vic-combo-best').textContent=S.sessionMaxCombo>=3?'Best combo: x'+S.sessionMaxCombo+(S.sessionMaxCombo>=4?' — 2x coins!':''):'';
  $('vic-unlock').textContent=S.newUnlocks.length>0?(S.newUnlocks.length+' Castle Part'+(S.newUnlocks.length>1?'s':'')+' Unlocked!'):'';
  S.newUnlocks=[];
  var btns=$('vic-btns');btns.innerHTML='';
  var canNext=S.maxUnlock[S.region]>S.level&&S.level<9;
  var canBoss=S.level===9&&(S.maxUnlock[S.region]||0)>=10&&!S.bossDefeated.has(S.region);
  var btnDefs=[
    {l:'MAP',fn:function(){sfx('tick');initRegion();goTo('region');},bg:'#374151'},
    {l:'RETRY',fn:function(){sfx('coin');startLevel(S.level);},bg:'#374151'},
    {l:'BUILD',fn:function(){sfx('tick');initBuilder();goTo('builder');},bg:'#4338ca'}
  ];
  if(canNext)btnDefs.push({l:'NEXT',fn:function(){sfx('coin');startLevel(S.level+1);},bg:'#15803d'});
  if(canBoss)btnDefs.push({l:'BOSS!',fn:function(){sfx('tick');startBoss();},bg:'#dc2626'});
  btnDefs.forEach(function(bd){
    var b=el('div','background:'+bd.bg+';border-radius:8px;padding:12px 16px;font-size:10px;color:#fff;cursor:pointer;',bd.l,{class:'pb'});
    b.onclick=bd.fn;btns.appendChild(b);
  });
}

// BOSS
function startBoss(){
  S.bossHP=QPB;S.playerHP=3;S.bossAnswered=false;S.bossUsedKeys=new Set();S.combo=0;S.sessionMaxCombo=0;
  var w=getWorldData(S.region);
  stopBg();playBg('boss');audBtn('boss-aud');
  $('boss-name').textContent=w.bossName;$('boss-spr').textContent=w.boss;updateBossHUD();
  $('btn-boss-back').onclick=function(){sfx('tick');clearInterval(S.bossTimerInterval);stopBg();playBg('w'+(S.region%6));S.combo=0;bgSpeedMult=1.0;initRegion();goTo('region');};
  goTo('boss');sfx('bossentry');
  setTimeout(function(){showBubble(w.intro,3000);},900);
  setTimeout(function(){loadBossQ();},1200);
}
function updateBossHUD(){
  $('boss-hp-bar').style.width=(S.bossHP/QPB*100)+'%';
  $('boss-hp-txt').textContent=S.bossHP+'/'+QPB;
  var html='';
  for(var bhi=0;bhi<3;bhi++){html+='<span style="font-size:1.1rem;opacity:'+(bhi<S.playerHP?1:.2)+'">❤️</span>';}
  $('boss-php').innerHTML=html;
}
function showBubble(t,d){
  d=d||2500;
  var b=$('boss-bubble');b.textContent=t;b.style.display='block';speakBoss(t);
  setTimeout(function(){b.style.display='none';},d);
}
var BOSS_HURT=['AARGH!','Lucky hit!','Impossible!','GRAAAH!','Not yet!','You DARE?!'];
var BOSS_TAUNT=['HA! Too slow!','Take THAT!','HAHAHAHA!','Bow before me!'];
var _bossHitFast=false;
function loadBossQ(){
  clearInterval(S.bossTimerInterval);S.bossQ=genBossQ();S.bossAnswered=false;_bossHitFast=true;
  renderQ(S.bossQ,'bq-icon','bq-body','b-choices',function(choice,btn){
    if(S.bossAnswered)return;S.bossAnswered=true;clearInterval(S.bossTimerInterval);
    var ok=choice===S.bossQ.a;
    addStat(S.bossQ.type,ok);
    document.querySelectorAll('#b-choices .choice-btn').forEach(function(b){
      b.disabled=true;
      if(b.textContent===S.bossQ.a)b.classList.add('ok');
      else if(b===btn&&!ok)b.classList.add('ng');
    });
    if(ok){
      var mult=getComboMult(),earned=3*mult;
      S.bossHP--;S.coins+=earned;S.totalCoins+=earned;S.combo++;
      if(S.combo>S.maxCombo){S.maxCombo=S.combo;save();}
      if(_bossHitFast&&S.bossTimerVal>=20){S.achievements['a_boss_fast']=Date.now();}
      sfx('boss');showBubble(pick(BOSS_HURT),2000);
      toast('b-toast','HIT! +'+earned+(mult>1?' (2x COMBO!)':''),1000);
      save();checkAchievements();
    }else{
      S.playerHP--;sfx('ng');showBubble(pick(BOSS_TAUNT),1600);
    }
    updateBossHUD();
    setTimeout(function(){
      if(ok&&S.bossHP<=0)bossWin();
      else if(!ok&&S.playerHP<=0)bossLose();
      else loadBossQ();
    },1300);
  });
  S.bossTimerVal=30;updateBossTimer();
  S.bossTimerInterval=setInterval(function(){
    S.bossTimerVal--;updateBossTimer();_bossHitFast=false;
    if(S.bossTimerVal<=0){
      clearInterval(S.bossTimerInterval);
      if(!S.bossAnswered){
        S.bossAnswered=true;S.playerHP--;sfx('ng');
        showBubble('TOO SLOW! HAHAHA!',1800);updateBossHUD();
        setTimeout(function(){if(S.playerHP<=0)bossLose();else loadBossQ();},1400);
      }
    }
  },1000);
}
function updateBossTimer(){
  var n=$('boss-timer-num'),bar=$('boss-timer-bar');if(!n||!bar)return;
  n.textContent=S.bossTimerVal+'s';
  n.style.color=S.bossTimerVal<=10?'#ef4444':S.bossTimerVal<=20?'#eab308':'#22c55e';
  bar.style.width=(S.bossTimerVal/30*100)+'%';
}
function bossWin(){
  clearInterval(S.bossTimerInterval);
  var w=getWorldData(S.region),isFirstWin=!S.bossDefeated.has(S.region);
  S.bossWins[S.region]=(S.bossWins[S.region]||0)+1;
  if(isFirstWin){
    S.bossDefeated.add(S.region);
    S.badges=S.badges.filter(function(b){return b.name!==w.badge.name;}).concat([w.badge]);
    if(S.region<99)S.maxUnlock[S.region+1]=S.maxUnlock[S.region+1]||0;
  }else{
    S.achievements['a_boss_rem']=Date.now();
  }
  var bonusCoins=isFirstWin?15:8;S.coins+=bonusCoins;S.totalCoins+=bonusCoins;
  var hadUnlocks=isFirstWin?autoBuiltCheck():false;
  save();checkAchievements();sfx('power');confetti();speak(w.win,1.4,1.0);
  stopBg();playBg('w'+(S.region%6));S.combo=0;bgSpeedMult=1.0;
  $('bv-icon').textContent=w.badge.e;$('bv-sub').textContent=w.name+' conquered!';
  $('bv-badge').innerHTML='<span style="font-size:3rem">'+w.badge.e+'</span><div><div style="font-size:9px;color:#aaa">'+(isFirstWin?'NEW BADGE!':'BADGE EARNED')+'</div><div style="font-size:11px;color:var(--gold);margin-top:3px">'+w.badge.name+'</div><div style="font-family:system-ui;font-size:13px;color:#ccc;margin-top:2px">'+w.badge.desc+'</div></div>';
  $('bv-reward').textContent='+'+bonusCoins+' BOSS COINS'+(isFirstWin?' (first win bonus!)':' (rematch reward!)');
  $('bv-castle-unlock').textContent=hadUnlocks?'New castle parts unlocked!':'';
  var btns=$('bv-btns');btns.innerHTML='';
  var bvDefs=[
    {l:'REMATCH',fn:function(){sfx('tick');startBoss();},bg:'#dc2626'},
    {l:'BUILD',fn:function(){sfx('tick');initBuilder();goTo('builder');},bg:'#4338ca'},
    {l:'HOME',fn:function(){sfx('tick');stopBg();playBg('home');initHome();goTo('home');},bg:'#374151'}
  ];
  if(isFirstWin&&S.region<49)bvDefs.push({l:'NEXT WORLD',fn:function(){S.region++;playBg('w'+(S.region%6));initRegion();goTo('region');},bg:'#15803d'});
  bvDefs.forEach(function(bd){
    var b=el('div','background:'+bd.bg+';border-radius:8px;padding:12px 16px;font-size:10px;color:#fff;cursor:pointer;',bd.l,{class:'pb'});
    b.onclick=bd.fn;btns.appendChild(b);
  });
  goTo('bvic');
}
function bossLose(){
  clearInterval(S.bossTimerInterval);stopBg();playBg('w'+(S.region%6));
  speakBoss(getWorldData(S.region).lose);S.combo=0;bgSpeedMult=1.0;
  $('btn-bl-map').onclick=function(){sfx('tick');initRegion();goTo('region');};
  $('btn-bl-retry').onclick=function(){sfx('tick');startBoss();};
  goTo('blose');
}

// CASTLE BUILDER
function getTimeOfDay(){var h=new Date().getHours();if(h>=5&&h<9)return'dawn';if(h>=9&&h<17)return'day';if(h>=17&&h<20)return'sunset';return'night';}
function getSkyCss(){return{dawn:'linear-gradient(180deg,#FF7043 0%,#FFB74D 30%,#FFF176 60%,#B3E5FC 100%)',day:'linear-gradient(180deg,#29B6F6 0%,#4FC3F7 40%,#B3E5FC 80%,#81C784 100%)',sunset:'linear-gradient(180deg,#FF5722 0%,#FF9800 25%,#FFC107 50%,#7986CB 80%,#3F51B5 100%)',night:'linear-gradient(180deg,#0D0D2B 0%,#1A237E 35%,#283593 60%,#1B2631 100%)'}[getTimeOfDay()];}
function buildCount(){return CASTLE_PARTS.filter(function(p){return!p.free&&(S.partLevels[p.id]||0)>=MAX_PART_LEVEL;}).length;}
function totalLevels(){return S.completed.size;}
function partState(p){
  if(p.free)return'built';
  var lv=S.partLevels[p.id]||0;
  if(lv>=MAX_PART_LEVEL)return'built';
  var req=p.req||{};
  var levOk=req.levels===undefined||totalLevels()>=req.levels;
  var bossOk=req.boss===undefined||bossCount()>=req.boss;
  if(!levOk||!bossOk)return'locked';
  if(p.cost===0)return'auto';
  if(S.coins>=p.cost)return'avail';
  return'need-coins';
}
function bossCount(){return S.bossDefeated.size;}
function autoBuiltCheck(){
  var any=false;
  CASTLE_PARTS.forEach(function(p){
    if(p.free)return;
    var lv=S.partLevels[p.id]||0;
    if(lv>0)return;
    if(partState(p)==='auto'){S.partLevels[p.id]=MAX_PART_LEVEL;S.newUnlocks.push(p);any=true;}
  });
  if(any)save();return any;
}
function availableCount(){
  return CASTLE_PARTS.filter(function(p){
    return!p.free&&(S.partLevels[p.id]||0)<MAX_PART_LEVEL&&partState(p)==='avail';
  }).length;
}
function initBuilder(){
  audBtn('bld-aud');renderBuilderTabs();
  $('btn-bld-back').onclick=function(){sfx('tick');stopBg();playBg('home');initHome();goTo('home');};
}
function renderBuilderTabs(){
  var tabs=[{k:'castle',l:'Build'},{k:'shop',l:'Shop'},{k:'decor',l:'Court'},{k:'collection',l:'Collect'},{k:'progress',l:'Stats'}];
  $('bld-tabs').innerHTML=tabs.map(function(t){
    var active=S.blTab===t.k;
    return '<div data-tab="'+t.k+'" class="pb" style="flex:1;padding:9px 2px;text-align:center;font-size:9px;border-radius:6px;cursor:pointer;background:'+(active?'var(--gold)':'rgba(255,255,255,.08)')+';color:'+(active?'#1a1a1a':'#fff')+';opacity:'+(active?1:.65)+';min-width:0;">'+t.l+'</div>';
  }).join('');
  $('bld-tabs').querySelectorAll('[data-tab]').forEach(function(b){
    b.onclick=function(){sfx('tick');S.blTab=b.dataset.tab;renderBuilderTabs();renderBuilderContent();};
  });
  renderBuilderContent();
}
function renderBuilderContent(){
  var c=$('bld-content');c.innerHTML='';$('bld-coins').textContent=S.coins;
  var fp=buildCount(),tot=CASTLE_PARTS.filter(function(p){return!p.free;}).length;
  $('bld-sub').textContent=fp+'/'+tot+' parts · '+S.potionStock+' pot · '+S.decorSlots.filter(function(x){return x!==null;}).length+'/8 decor';
  if(S.blTab==='castle')renderCastle(c);
  else if(S.blTab==='shop')renderShop(c);
  else if(S.blTab==='decor')renderDecorCourt(c);
  else if(S.blTab==='collection')renderCollection(c);
  else renderProgress(c);
}

function renderCastle(container){
  var tod=getTimeOfDay();
  var skyDiv=document.createElement('div');
  skyDiv.style.cssText='position:relative;overflow:hidden;height:190px;flex-shrink:0;';
  skyDiv.style.background=getSkyCss();
  var todLabels={dawn:'DAWN',day:'DAY',sunset:'SUNSET',night:'NIGHT'};
  var todLabel=el('div','position:absolute;top:8px;left:10px;background:rgba(0,0,0,.5);border:2px solid rgba(255,255,255,.2);border-radius:10px;padding:4px 10px;font-size:9px;color:#fff;',todLabels[tod]);
  skyDiv.appendChild(todLabel);
  if(tod==='day')skyDiv.innerHTML+='<div style="position:absolute;top:10px;right:18px;font-size:28px">☀️</div>';
  else if(tod==='night'){
    skyDiv.innerHTML+='<div style="position:absolute;top:8px;right:18px;font-size:22px">🌙</div>';
    for(var si=0;si<8;si++)skyDiv.innerHTML+='<div style="position:absolute;top:'+(5+si*8)+'%;left:'+(10+si*12)+'%;font-size:9px;opacity:.7">✨</div>';
  }else if(tod==='sunset')skyDiv.innerHTML+='<div style="position:absolute;top:8px;right:18px;font-size:22px">🌇</div>';
  else skyDiv.innerHTML+='<div style="position:absolute;top:8px;right:18px;font-size:20px">🌅</div>';
  var ground=document.createElement('div');
  ground.style.cssText='position:absolute;bottom:0;left:0;right:0;height:60px;background:linear-gradient(180deg,#2d4a1a,#1a2f0d);display:flex;align-items:center;padding:6px 10px;overflow:hidden;gap:3px;flex-wrap:wrap;';
  var builtParts=CASTLE_PARTS.filter(function(p){return!p.free&&(S.partLevels[p.id]||0)>0;});
  var placedDecor=S.decorSlots.filter(function(x){return x!==null;}).map(function(id){return SHOP_ITEMS.filter(function(it){return it.id===id;})[0];}).filter(function(x){return!!x;});
  if(builtParts.length===0&&placedDecor.length===0){
    ground.innerHTML='<span style="color:#555;font-size:10px;font-family:var(--px)">Build your first part below!</span>';
  }else{
    builtParts.slice(0,10).forEach(function(p){
      var lv=Math.min(S.partLevels[p.id]||0,MAX_PART_LEVEL);
      var op=0.3+lv/MAX_PART_LEVEL*0.7;
      var sp=document.createElement('span');

function mkPartCard(p){

  var isAvail=st==='avail'||st==='auto',isNeed=st==='need-coins',isLocked=st==='locked';

  card.style.cssText='background:'+(isAvail?'rgba(0,255,100,.08)':isNeed?'rgba(251,208,0,.06)':isLocked?'rgba(0,0,0,.3)':'rgba(255,255,255,.05)')+';border:2px solid '+(isAvail?'rgba(0,255,100,.4)':isNeed?'rgba(251,208,0,.3)':isLocked?'#222':'rgba(255,255,255,.15)')+';border-radius:12px;padding:12px 8px;display:flex;flex-direction:column;align-items:center;text-align:center;cursor:'+(isAvail||lv>0?'pointer':'default')+';';
  var hammers='';
  for(var hi=0;hi<MAX_PART_LEVEL;hi++){
    hammers+='<span class="hammer-slot '+(hi<lv?'filled':'empty')+'">'+(hi<lv?'H':'_')+'</span>';
  }
  var statusText=lv+'/'+MAX_PART_LEVEL+(isAvail?' — '+p.cost+' coins':isNeed?' — Need '+p.cost:isLocked?' locked':' done');
  card.innerHTML='<div style="font-size:1.8rem;margin-bottom:5px;opacity:'+(isLocked?.3:1)+'">'+p.e.split('')[0]+'</div><div style="font-size:9px;color:'+(isLocked?'#555':'#fff')+';margin-bottom:6px">'+p.label+'</div><div style="display:flex;gap:2px;margin-bottom:7px">'+hammers+'</div><div style="font-size:9px;color:'+(isAvail?'#00ff88':isNeed?'var(--gold)':isLocked?'#333':'#888')+'">'+statusText+'</div>';

}

function showPartDetail(p){

function closeSheet(){$('bld-ov').classList.remove('on');$('bld-sheet').classList.add('off');}

window.executeBuild=function(id){
  var p=CASTLE_PARTS.filter(function(pp){return pp.id===id;})[0];
  if(!p)return;
  var lv=S.partLevels[p.id]||0;
  if(lv>=MAX_PART_LEVEL)return;
  if(p.cost>0&&S.coins<p.cost){closeSheet();return;}
  if(p.cost>0){S.coins-=p.cost;$('bld-coins').textContent=S.coins;}
  S.partLevels[p.id]=(lv+1);save();sfx('build');confetti();
  speak(p.label+' upgraded to level '+(lv+1)+'!',1.3,1.0);
  checkAchievements();closeSheet();renderBuilderContent();
};

window.buyShopItem=function(id){
  var it=SHOP_ITEMS.filter(function(i){return i.id===id;})[0];
  if(!it||S.coins<it.cost)return;
  var owned=S.shopOwned[it.id]||0;
  if(!it.repeatable&&!it.maxOwned&&owned>0)return;
  if(it.maxOwned&&owned>=it.maxOwned)return;
  S.coins-=it.cost;S.shopOwned[it.id]=(owned+1);
  if(it.effect==='potion1'){S.potionStock+=1;speak('One potion added to your bag!',1.2,1.0);}
  else if(it.effect==='potion3'){S.potionStock+=3;speak('Three potions added to your bag!',1.3,1.0);}
  else if(it.effect==='potion5'){S.potionStock+=5;speak('Five potions! Amazing value!',1.3,1.0);}
  else if(it.effect==='addMaxHp'){S.maxHp=Math.min(S.maxHp+1,6);S.hp=Math.min(S.hp+1,S.maxHp);speak('Iron Shield! Max hearts increased!',1.3,1.0);}
  else if(it.effect==='doubleCoin'){speak('Star Boost! Double coins next level!',1.2,1.0);}
  else if(it.effect==='bonusCoins'){S.coins+=15;S.totalCoins+=15;speak('Gold Key! Bonus 15 coins!',1.2,1.0);}
  else if(it.effect==='tripleStar'){speak('XP Scroll! Triple stars next level!',1.2,1.0);}
  else speak(it.name+' added to collection!',1.2,1.0);
  save();sfx('build');confetti();$('bld-coins').textContent=S.coins;
  checkAchievements();closeSheet();renderBuilderContent();
};

// COLLECTION
function renderCollection(container){
  var achUnlocked=ACHIEVEMENTS.filter(function(a){return S.achievements[a.id];});

  var shopOwned=SHOP_ITEMS.filter(function(it){return(S.shopOwned[it.id]||0)>0;});
  var numBadges=maxWorldIndex()+2;if(numBadges>14)numBadges=14;
  var bossBadges=[];
  for(var bi=0;bi<numBadges;bi++){
    var wd=getWorldData(bi);
    bossBadges.push(Object.assign({},wd.badge,{world:wd.name,unlocked:S.bossDefeated.has(bi)}));

  weak.forEach(function(w){
    var col=w.pct<40?'#ef4444':w.pct<60?'#f97316':'#eab308';
    c.appendChild(el('div','background:#fff;border-radius:16px;padding:16px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.06)','<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px"><span style="font-size:15px;font-weight:900;color:#1e293b">'+w.icon+' '+w.label+'</span><span style="font-weight:900;font-size:14px;padding:4px 10px;border-radius:20px;background:'+col+'22;color:'+col+'">'+w.pct+'%</span></div><div style="height:8px;background:#f1f5f9;border-radius:3px;overflow:hidden;margin-bottom:8px"><div style="height:100%;width:'+w.pct+'%;background:'+col+';border-radius:3px"></div></div><div style="font-size:12px;color:#64748b">Tip: '+(SUGG[w.key]||'Practice regularly!')+'</div>'));
  });
}
function renderParLog(c){
  var n=S.wrongLog.length;
  var hdr=el('div','display:flex;align-items:center;justify-content:space-between;margin-bottom:12px');
  hdr.innerHTML='<div style="font-size:14px;font-weight:700;color:#475569">'+n+' mistake'+(n!==1?'s':'')+' logged</div>';
  if(n>0){
    var clr=el('button','background:#fef2f2;border:1px solid #fecaca;color:#dc2626;padding:8px 12px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer','Clear');
    clr.onclick=function(){S.wrongLog=[];save();renderParContent();};
    hdr.appendChild(clr);
  }
  c.appendChild(hdr);
  if(!n){c.innerHTML+='<div style="text-align:center;color:#94a3b8;padding:40px 0;font-size:14px">No mistakes yet!</div>';return;}
  S.wrongLog.slice(0,80).forEach(function(w,idx){
    var card=document.createElement('div');
    card.style.cssText='background:#fff;border-radius:16px;padding:14px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.06)';
    var headerHtml='<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px"><span style="font-size:1.4rem">'+(w.i||'?')+'</span><div style="flex:1"><div style="font-size:12px;font-weight:700;color:#475569">'+((TINFO[w.type]&&TINFO[w.type].l)||w.type)+'</div><div style="font-size:11px;color:#94a3b8">'+(w.world||'')+' · '+(w.level||'')+' · '+(w.time||'')+'</div></div></div>';
    var displayHtml='';
    if(w.display){
      displayHtml='<div style="background:#f8fafc;border-radius:10px;padding:12px;margin-bottom:10px;overflow:hidden;max-height:120px;text-align:center">'+w.display+'</div>';
    }else if(w.q){
      displayHtml='<div style="font-size:12px;color:#334155;white-space:pre-line;background:#f8fafc;border-radius:8px;padding:10px;margin-bottom:10px;line-height:1.7">'+w.q+'</div>';
    }
    var ansHtml='<div style="display:flex;gap:8px;margin-bottom:10px"><div style="flex:1;background:#fef2f2;border-radius:8px;padding:8px;text-align:center"><div style="font-size:11px;color:#f87171;font-weight:700">Your Answer</div><div style="font-size:17px;font-weight:900;color:#dc2626">'+(w.given||'?')+'</div></div><div style="flex:1;background:#f0fdf4;border-radius:8px;padding:8px;text-align:center"><div style="font-size:11px;color:#4ade80;font-weight:700">Correct</div><div style="font-size:17px;font-weight:900;color:#16a34a">'+(w.correct||'?')+'</div></div></div>';
    var practHtml=w.ch&&w.ch.length?'<button onclick="openPractice('+idx+')" style="width:100%;background:linear-gradient(135deg,#4338ca,#7c3aed);border:2px solid #4338ca;border-radius:10px;padding:12px;font-family:var(--px);font-size:11px;color:#fff;cursor:pointer;">Practice This Question</button>':'';
    card.innerHTML=headerHtml+displayHtml+ansHtml+practHtml;
    c.appendChild(card);
  });
}

// PRACTICE MODAL
window.openPractice=function(logIdx){
  var entry=S.wrongLog[logIdx];if(!entry)return;
  S.practiceEntry={entry:entry,logIdx:logIdx};
  $('practice-result').innerHTML='';
  var qDiv=$('practice-q');
  if(entry.display){
    qDiv.innerHTML='<div style="font-size:1.8rem;margin-bottom:6px">'+(entry.i||'?')+'</div><div>'+entry.display+'</div>';
  }else{
    qDiv.innerHTML='<div style="font-size:1.8rem;margin-bottom:6px">'+(entry.i||'?')+'</div><div style="font-family:var(--px);font-size:13px;color:#fff;white-space:pre-line;line-height:1.8">'+(entry.q||'Practice question')+'</div>';
  }
  var ch=$('practice-choices');ch.innerHTML='';
  var CBGS=['#E52521','#049CD8','#43B047','#e78c00'];
  var choices=entry.ch&&entry.ch.length?entry.ch:mkC(entry.correct,[]);
  choices.forEach(function(cv,i){
    var b=document.createElement('button');
    b.className='choice-btn';
    b.style.background=CBGS[i%4];
    b.textContent=cv;
    b.onclick=function(){
      ch.querySelectorAll('.choice-btn').forEach(function(btn){
        btn.disabled=true;
        if(btn.textContent===entry.correct)btn.classList.add('ok');
        else if(btn===b&&cv!==entry.correct)btn.classList.add('ng');
      });
      if(cv===entry.correct){
        $('practice-result').innerHTML='<div style="color:#22c55e;font-size:13px;padding:10px;background:rgba(34,197,94,.1);border-radius:8px;">Correct! Well done! +1 coin</div>';
        sfx('ok');S.coins+=1;S.totalCoins+=1;
        S.achievements['a_practice']=Date.now();
        if(S.wrongLog[logIdx])S.wrongLog[logIdx]._practiced=true;
        save();checkAchievements();
      }else{
        $('practice-result').innerHTML='<div style="color:#f87171;font-size:13px;padding:10px;background:rgba(239,68,68,.1);border-radius:8px;">The answer is <b>'+entry.correct+'</b>. Keep practising!</div>';
        sfx('ng');
      }
    };
    ch.appendChild(b);
  });
  $('practice-modal').classList.add('on');
};
window.closePractice=function(){$('practice-modal').classList.remove('on');};
window.resetAll=function(){if(!confirm('Reset all save data?'))return;try{localStorage.removeItem(SK);}catch(e){}location.reload();};

document.addEventListener('DOMContentLoaded',function(){
  document.addEventListener('touchstart',function(){try{AC();}catch(e){}},{once:true,passive:true});
  document.addEventListener('click',function(){try{AC();}catch(e){}},{once:true});
  applyPendingRegen();
  startRegenTimer();
  autoBuiltCheck();
  initHome();
  playBg('home');
  goTo('home');
});
